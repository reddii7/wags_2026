<!DOCTYPE html>
<html lang="en" style="background-color: #1c1c1e">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C1C1E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Per-deploy query busts CDN/Safari cache; iOS Home Screen tiles may still need remove + re-add once. -->
  <link rel="icon" href="/favicon.ico?v=__WAGS_SHELL_BUILD__" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=__WAGS_SHELL_BUILD__" />
  <title>WAGS</title>
  <!-- Bust stale Web Clip HTML/JS when this value changes (injected at build).
       Uses localStorage so the check fires on the FIRST open after a new deploy,
       not the second (sessionStorage is cleared between Web Clip sessions on iOS). -->
  <script>
    (function () {
      try {
        var key = "wags-shell-build";
        var cur = "__WAGS_SHELL_BUILD__";
        var prev = localStorage.getItem(key);
        if (prev && prev !== cur) {
          localStorage.setItem(key, cur);
          var u = new URL(location.href);
          u.searchParams.set("v", String(Date.now()));
          location.replace(u.toString());
          return;
        }
        localStorage.setItem(key, cur);
      } catch (e) {}
    })();
  </script>
  <!-- Vite/Vue standard entry -->
  <script type="module" src="/src/main.js"></script>
</head>

<body style="margin: 0; background-color: #1c1c1e">
  <div id="app"></div>
</body>

</html>
