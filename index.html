<!DOCTYPE html>
<html lang="en" style="background-color: #1c1c1e">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C1C1E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Per-deploy query busts CDN/Safari cache; iOS Home Screen tiles may still need remove + re-add once. -->
  <link rel="icon" href="/favicon.ico?v=__WAGS_SHELL_BUILD__" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=__WAGS_SHELL_BUILD__" />
  <title>WAGS</title>
  <!-- Catch stale Web Clip asset 404s (old hashed JS filename no longer on server).
       Fires before the module script runs, so blank-screen on 404 is avoided.
       Throttled to once per 10s to prevent reload loops. -->
  <script>
    (function () {
      try {
        window.addEventListener('error', function (e) {
          var t = e.target;
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK') && t !== window) {
            var lastKey = 'wags-asset-reload';
            var last = parseInt(localStorage.getItem(lastKey) || '0', 10);
            if (Date.now() - last > 10000) {
              localStorage.setItem(lastKey, String(Date.now()));
              localStorage.removeItem('wags-shell-build');
              location.reload();
            }
          }
        }, true);

        // Build-ID check: catches stale HTML that survived the asset reload above.
        var key = "wags-shell-build";
        var cur = "__WAGS_SHELL_BUILD__";
        var prev = localStorage.getItem(key);
        if (prev && prev !== cur) {
          localStorage.setItem(key, cur);
          var u = new URL(location.href);
          u.searchParams.set("v", String(Date.now()));
          location.replace(u.toString());
          return;
        }
        localStorage.setItem(key, cur);
      } catch (e) {}
    })();
  </script>
  <!-- Vite/Vue standard entry -->
  <script type="module" src="/src/main.js"></script>
</head>

<body style="margin: 0; background-color: #1c1c1e">
  <div id="app"></div>
</body>

</html>
