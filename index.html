<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C1C1E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>WAGS</title>
  <!-- Auto-unregister stale service workers so users never get a blank page after a deploy -->
  <script>
    (function () {
      var BUILD = '__APP_VERSION__';
      var stored = localStorage.getItem('sw_build');
      if (stored !== BUILD) {
        localStorage.setItem('sw_build', BUILD);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            if (regs.length) {
              Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
                location.reload();
              });
            }
          });
        }
      }
    })();
  </script>
  <!-- Vite/Vue standard entry -->
  <script type="module" src="/src/main.js"></script>
</head>

<body>
  <div id="app"></div>
</body>

</html>
