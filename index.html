<!DOCTYPE html>
<html lang="en" style="background-color: #1c1c1e">

<head>
  <meta charset="UTF-8" />
  <!-- Baseline viewport (required); apple standalone tags follow your spec -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WAGS</title>

  <!-- iOS Home Screen: launch without Safari chrome (minimal meta set per spec) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" href="/favicon.ico?v=__WAGS_SHELL_BUILD__" sizes="any" />

  <!-- Bust stale Web Clip cached documents when ?v= is missing (hash-safe vs string concat). -->
  <script>
    (function () {
      try {
        if (!window.location.search.includes("v=")) {
          var u = new URL(window.location.href);
          u.searchParams.set("v", String(Date.now()));
          window.location.replace(u.toString());
          return;
        }
      } catch (e) {}
    })();
  </script>

  <!-- Catch stale Web Clip asset 404s (old hashed JS filename no longer on server).
       Throttled to once per 10s to prevent reload loops. -->
  <script>
    (function () {
      try {
        window.addEventListener(
          "error",
          function (e) {
            var t = e.target;
            if (
              t &&
              (t.tagName === "SCRIPT" || t.tagName === "LINK") &&
              t !== window
            ) {
              var lastKey = "wags-asset-reload";
              var last = parseInt(localStorage.getItem(lastKey) || "0", 10);
              if (Date.now() - last > 10000) {
                localStorage.setItem(lastKey, String(Date.now()));
                localStorage.removeItem("wags-shell-build");
                location.reload();
              }
            }
          },
          true,
        );

        var key = "wags-shell-build";
        var cur = "__WAGS_SHELL_BUILD__";
        var prev = localStorage.getItem(key);
        if (prev && prev !== cur) {
          localStorage.setItem(key, cur);
          var u = new URL(location.href);
          u.searchParams.set("v", String(Date.now()));
          location.replace(u.toString());
          return;
        }
        localStorage.setItem(key, cur);
      } catch (e) {}
    })();
  </script>

  <!-- Vite/Vue standard entry -->
  <script type="module" src="/src/main.js"></script>
</head>

<body style="margin: 0; background-color: #1c1c1e">
  <div id="app"></div>
</body>

</html>
