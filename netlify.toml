# Member PWA (repo root). In Netlify → Site settings → Environment variables set:
#   VITE_SUPABASE_URL       (e.g. https://<ref>.supabase.co)
#   VITE_SUPABASE_ANON_KEY  (public anon key)
# Optional:
#   VITE_FETCH_ALL_DATA_URL (override edge function URL)
# Builds use fallbacks from src/lib/supabaseConfig.js if unset, but set these for production rotation.

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
