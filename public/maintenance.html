<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAGS - Maintenance</title>
  <style>
    body { background: #181818; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #232323; border-radius: 12px; padding: 2.5em 2em; box-shadow: 0 2px 16px #0008; max-width: 90vw; text-align: center; }
    h1 { font-size: 2.2em; margin-bottom: 0.5em; }
    p { font-size: 1.2em; margin: 0.5em 0 0 0; }
  </style>
</head>

<body>
  <div class="box">
    <h1>WAGS App Maintenance</h1>
    <p>
      The app is being refreshed.<br>
      Please close and reopen this app in 30 seconds.<br>
      <br>
      <b>This will fix blank screens for all users.</b>
    </p>
    <p style="margin-top:2em;font-size:0.95em;opacity:0.7;">
      If you see this page, your device is now reset.<br>
      You can close and reopen the app to return to normal.
    </p>
  </div>
</body>

</html>
